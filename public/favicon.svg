<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#0a0a0a"/>

  <!-- Pixel grid "D" letter -->
  <!-- Column 1 (x=6): full height bar -->
  <rect x="6" y="6" width="3" height="3" fill="#22c55e"/>
  <rect x="6" y="9" width="3" height="3" fill="#22c55e"/>
  <rect x="6" y="12" width="3" height="3" fill="#22c55e"/>
  <rect x="6" y="15" width="3" height="3" fill="#22c55e"/>
  <rect x="6" y="18" width="3" height="3" fill="#22c55e"/>
  <rect x="6" y="21" width="3" height="3" fill="#22c55e"/>

  <!-- Top row extending right -->
  <rect x="9" y="6" width="3" height="3" fill="#22c55e"/>
  <rect x="12" y="6" width="3" height="3" fill="#22c55e"/>
  <rect x="15" y="6" width="3" height="3" fill="#4ade80"/>

  <!-- Bottom row extending right -->
  <rect x="9" y="21" width="3" height="3" fill="#22c55e"/>
  <rect x="12" y="21" width="3" height="3" fill="#22c55e"/>
  <rect x="15" y="21" width="3" height="3" fill="#4ade80"/>

  <!-- Right curve -->
  <rect x="18" y="9" width="3" height="3" fill="#4ade80"/>
  <rect x="21" y="12" width="3" height="3" fill="#86efac"/>
  <rect x="21" y="15" width="3" height="3" fill="#86efac"/>
  <rect x="18" y="18" width="3" height="3" fill="#4ade80"/>

  <!-- Subtle glow pixel accents -->
  <rect x="3" y="3" width="2" height="2" fill="#22c55e" opacity="0.15"/>
  <rect x="27" y="27" width="2" height="2" fill="#22c55e" opacity="0.15"/>
  <rect x="27" y="3" width="2" height="2" fill="#22c55e" opacity="0.1"/>
</svg>
